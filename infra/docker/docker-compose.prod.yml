services:
  auth-service:
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: ${AUTH_DB_HOST:-auth-mysql:3306}
      DB_USERNAME: ${AUTH_DB_USERNAME:?AUTH_DB_USERNAME is required}
      DB_PASSWORD: ${AUTH_DB_PASSWORD:?AUTH_DB_PASSWORD is required}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      EUREKA_URL: ${EUREKA_URL:-http://adbin:adbin@eureka-server:8761/eureka/}
      FRONTEND_URL: ${FRONTEND_URL:?FRONTEND_URL is required}
      JWT_COOKIE_DOMAIN: ${JWT_COOKIE_DOMAIN:?JWT_COOKIE_DOMAIN is required}
      USER_SERVICE_BASE_URL: ${USER_SERVICE_BASE_URL:-http://user-service:8081}

  user-service:
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: ${USER_DB_HOST:-user-mysql:3306}
      DB_USERNAME: ${USER_DB_USERNAME:?USER_DB_USERNAME is required}
      DB_PASSWORD: ${USER_DB_PASSWORD:?USER_DB_PASSWORD is required}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      EUREKA_URL: ${EUREKA_URL:-http://adbin:adbin@eureka-server:8761/eureka/}
      FRONTEND_URL: ${FRONTEND_URL:?FRONTEND_URL is required}
      JWT_COOKIE_DOMAIN: ${JWT_COOKIE_DOMAIN:?JWT_COOKIE_DOMAIN is required}

  habit-service:
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: ${HABIT_DB_HOST:-habit-mysql:3306}
      DB_USERNAME: ${HABIT_DB_USERNAME:?HABIT_DB_USERNAME is required}
      DB_PASSWORD: ${HABIT_DB_PASSWORD:?HABIT_DB_PASSWORD is required}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      EUREKA_URL: ${EUREKA_URL:-http://adbin:adbin@eureka-server:8761/eureka/}
      FRONTEND_URL: ${FRONTEND_URL:?FRONTEND_URL is required}
      JWT_COOKIE_DOMAIN: ${JWT_COOKIE_DOMAIN:?JWT_COOKIE_DOMAIN is required}

  gateway:
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
