server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: gateway
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  cloud:
    gateway:
      httpclient:
        connect-timeout: ${GATEWAY_CONNECT_TIMEOUT_MS:3000}
        response-timeout: ${GATEWAY_RESPONSE_TIMEOUT:5s}
      server:
        webflux:
          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
          routes:
            - id: auth-service
              uri: lb://auth-service
              predicates:
                - Path=/api/auth/**
            - id: auth-service-dev
              uri: lb://auth-service
              predicates:
                - Path=/api/dev/**
            - id: auth-admin-service
              uri: lb://auth-service
              predicates:
                - Path=/api/admin/**
            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/api/users/**
              filters:
                - AuthRequired
            - id: habit-service
              uri: lb://habit-service
              predicates:
                - Path=/api/habits/**
              filters:
                - AuthRequired
            - id: auth-service-docs
              uri: lb://auth-service
              predicates:
                - Path=/v3/api-docs/auth-service
              filters:
                - RewritePath=/v3/api-docs/auth-service, /v3/api-docs
            - id: user-service-docs
              uri: lb://user-service
              predicates:
                - Path=/v3/api-docs/user-service
              filters:
                - RewritePath=/v3/api-docs/user-service, /v3/api-docs
            - id: habit-service-docs
              uri: lb://habit-service
              predicates:
                - Path=/v3/api-docs/habit-service
              filters:
                - RewritePath=/v3/api-docs/habit-service, /v3/api-docs

cors:
  allowed-origins:
    - ${CORS_ALLOWED_ORIGIN_0:http://localhost:3000}
    - ${CORS_ALLOWED_ORIGIN_1:http://localhost:5173}
  allow-credentials: ${CORS_ALLOW_CREDENTIALS:true}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://${EUREKA_SERVER_USERNAME:adbin}:${EUREKA_SERVER_PASSWORD:adbin}@localhost:8761/eureka/}

jwt:
  secret: ${JWT_SECRET:12345678901234567890123456789012}
  cookie:
    access-token-name: ${JWT_COOKIE_ACCESS_TOKEN_NAME:access_token}

auth:
  session:
    redis:
      key-prefix:
        session: ${AUTH_SESSION_REDIS_SESSION_KEY_PREFIX:auth:session:}
        refresh: ${AUTH_SESSION_REDIS_REFRESH_KEY_PREFIX:auth:refresh:}
        user-sessions: ${AUTH_SESSION_REDIS_USER_SESSIONS_KEY_PREFIX:auth:user-sessions:}

springdoc:
  swagger-ui:
    urls:
      - name: auth-service
        url: /v3/api-docs/auth-service
      - name: user-service
        url: /v3/api-docs/user-service
      - name: habit-service
        url: /v3/api-docs/habit-service

logging:
  level:
    org.springframework.cloud.gateway: ${GATEWAY_LOG_LEVEL:INFO}
    org.springframework.web.reactive: ${WEB_REACTIVE_LOG_LEVEL:INFO}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always