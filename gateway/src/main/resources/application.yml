server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: gateway
  cloud:
    gateway:
      httpclient:
        connect-timeout: ${GATEWAY_CONNECT_TIMEOUT_MS:3000}
        response-timeout: ${GATEWAY_RESPONSE_TIMEOUT:5s}
      server:
        webflux:
          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
          routes:
            - id: auth-service
              uri: lb://auth-service
              predicates:
                - Path=/api/auth/**
            - id: auth-admin-service
              uri: lb://auth-service
              predicates:
                - Path=/api/admin/**
            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/api/users/**
            - id: task-service
              uri: lb://task-service
              predicates:
                - Path=/api/tasks/**

cors:
  allowed-origins:
    - ${CORS_ALLOWED_ORIGIN_0:http://localhost:3000}
    - ${CORS_ALLOWED_ORIGIN_1:http://localhost:5173}
  allow-credentials: ${CORS_ALLOW_CREDENTIALS:true}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://${EUREKA_SERVER_USERNAME:adbin}:${EUREKA_SERVER_PASSWORD:adbin}@localhost:8761/eureka/}

logging:
  level:
    org.springframework.cloud.gateway: ${GATEWAY_LOG_LEVEL:INFO}
    org.springframework.web.reactive: ${WEB_REACTIVE_LOG_LEVEL:INFO}
