spring:
  application:
    name: auth-service
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${AUTH_KAFKA_GROUP_ID:auth-service}

security:
  public-endpoints:
    - /api/auth/**

jwt:
  secret: ${JWT_SECRET:12345678901234567890123456789012}
  access-expiration: ${JWT_ACCESS_EXPIRATION:1800000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:1209600000}

app:
  kafka:
    topics:
      user-registered: ${USER_REGISTERED_TOPIC:user.registered}
