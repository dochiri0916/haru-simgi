spring:
  application:
    name: auth-service
  cloud:
    discovery:
      enabled: false

eureka:
  client:
    enabled: false

security:
  public-endpoints:
    - /api/auth/**
    - /api/internal/auth/**

jwt:
  secret: 12345678901234567890123456789012
  access-expiration: 1800000
  refresh-expiration: 1209600000
