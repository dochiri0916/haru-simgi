spring:
  application:
    name: auth-service
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: auth-service-test
    listener:
      auto-startup: false
  cloud:
    config:
      enabled: false
      import-check:
        enabled: false
    discovery:
      enabled: false

eureka:
  client:
    enabled: false

security:
  public-endpoints:
    - /api/auth/**

jwt:
  secret: 12345678901234567890123456789012
  access-expiration: 1800000
  refresh-expiration: 1209600000

app:
  kafka:
    topics:
      user-registered: user.registered
