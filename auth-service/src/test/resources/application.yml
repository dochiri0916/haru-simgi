spring:
  application:
    name: auth-service
  cloud:
    config:
      enabled: false
      import-check:
        enabled: false
    discovery:
      enabled: false

eureka:
  client:
    enabled: false

security:
  public-endpoints:
    - /api/auth/**

jwt:
  secret: 12345678901234567890123456789012
  access-expiration: 1800000
  refresh-expiration: 1209600000
