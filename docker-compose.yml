services:
  kafka:
    image: apache/kafka:3.9.0
    container_name: haru-simgi-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: q1Sh-9_ISia_zwGINzRvyQ

  auth-mysql:
    image: mysql:8.4
    container_name: haru-simgi-auth-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: auth_service
      MYSQL_USER: auth_user
      MYSQL_PASSWORD: auth_password
      MYSQL_ROOT_PASSWORD: root_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_password"]
      interval: 5s
      timeout: 5s
      retries: 20

  user-mysql:
    image: mysql:8.4
    container_name: haru-simgi-user-mysql
    ports:
      - "3308:3306"
    environment:
      MYSQL_DATABASE: user_service
      MYSQL_USER: user_user
      MYSQL_PASSWORD: user_password
      MYSQL_ROOT_PASSWORD: root_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_password"]
      interval: 5s
      timeout: 5s
      retries: 20

  config-server:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        MODULE_NAME: config-server
    container_name: haru-simgi-config-server
    depends_on:
      - kafka
    ports:
      - "9000:9000"
    env_file:
      - ./config-server.env
    environment:
      CONFIG_SERVER_USERNAME: ${CONFIG_SERVER_USERNAME:-adbin}
      CONFIG_SERVER_PASSWORD: ${CONFIG_SERVER_PASSWORD:-adbin}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "-u", "${CONFIG_SERVER_USERNAME:-adbin}:${CONFIG_SERVER_PASSWORD:-adbin}", "http://localhost:9000/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  eureka-server:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        MODULE_NAME: eureka-server
    container_name: haru-simgi-eureka-server
    depends_on:
      config-server:
        condition: service_healthy
    ports:
      - "8761:8761"
    environment:
      SERVER_PORT: 8761
      EUREKA_SERVER_USERNAME: ${EUREKA_SERVER_USERNAME:-adbin}
      EUREKA_SERVER_PASSWORD: ${EUREKA_SERVER_PASSWORD:-adbin}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "-u", "${EUREKA_SERVER_USERNAME:-adbin}:${EUREKA_SERVER_PASSWORD:-adbin}", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  auth-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        MODULE_NAME: auth-service
    container_name: haru-simgi-auth-service
    depends_on:
      eureka-server:
        condition: service_healthy
      auth-mysql:
        condition: service_healthy
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: 8082
      CONFIG_SERVER_URL: http://${CONFIG_SERVER_USERNAME:-adbin}:${CONFIG_SERVER_PASSWORD:-adbin}@config-server:9000
      EUREKA_DEFAULT_ZONE: http://${EUREKA_SERVER_USERNAME:-adbin}:${EUREKA_SERVER_PASSWORD:-adbin}@eureka-server:8761/eureka/
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://${EUREKA_SERVER_USERNAME:-adbin}:${EUREKA_SERVER_PASSWORD:-adbin}@eureka-server:8761/eureka/
      APP_USER_SERVICE_BASE_URL: http://user-service:8081
      USER_SERVICE_BASE_URL: http://user-service:8081
      SECURITY_PUBLIC_ENDPOINTS_0: /api/auth/**
      SECURITY_PUBLIC_ENDPOINTS_1: /api/dev/**
      JWT_SECRET: "12345678901234567890123456789012"
      SPRING_DATASOURCE_URL: jdbc:mysql://auth-mysql:3306/auth_service?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
      SPRING_DATASOURCE_USERNAME: auth_user
      SPRING_DATASOURCE_PASSWORD: auth_password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_PROFILES_ACTIVE: dev

  user-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        MODULE_NAME: user-service
    container_name: haru-simgi-user-service
    depends_on:
      eureka-server:
        condition: service_healthy
      user-mysql:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081
      CONFIG_SERVER_URL: http://${CONFIG_SERVER_USERNAME:-adbin}:${CONFIG_SERVER_PASSWORD:-adbin}@config-server:9000
      EUREKA_DEFAULT_ZONE: http://${EUREKA_SERVER_USERNAME:-adbin}:${EUREKA_SERVER_PASSWORD:-adbin}@eureka-server:8761/eureka/
      SECURITY_PUBLIC_ENDPOINTS_0: /internal/users
      SECURITY_PUBLIC_ENDPOINTS_1: /internal/users/social
      JWT_SECRET: "12345678901234567890123456789012"
      SPRING_DATASOURCE_URL: jdbc:mysql://user-mysql:3306/user_service?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
      SPRING_DATASOURCE_USERNAME: user_user
      SPRING_DATASOURCE_PASSWORD: user_password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update

  habit-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        MODULE_NAME: habit-service
    container_name: haru-simgi-habit-service
    depends_on:
      eureka-server:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      SERVER_PORT: 8083
      CONFIG_SERVER_URL: http://${CONFIG_SERVER_USERNAME:-adbin}:${CONFIG_SERVER_PASSWORD:-adbin}@config-server:9000
      EUREKA_DEFAULT_ZONE: http://${EUREKA_SERVER_USERNAME:-adbin}:${EUREKA_SERVER_PASSWORD:-adbin}@eureka-server:8761/eureka/
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://${EUREKA_SERVER_USERNAME:-adbin}:${EUREKA_SERVER_PASSWORD:-adbin}@eureka-server:8761/eureka/
      JWT_SECRET: "12345678901234567890123456789012"

  gateway:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        MODULE_NAME: gateway
    container_name: haru-simgi-gateway
    depends_on:
      eureka-server:
        condition: service_healthy
      auth-service:
        condition: service_started
      habit-service:
        condition: service_started
      user-service:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      EUREKA_DEFAULT_ZONE: http://${EUREKA_SERVER_USERNAME:-adbin}:${EUREKA_SERVER_PASSWORD:-adbin}@eureka-server:8761/eureka/
