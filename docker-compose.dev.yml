services:
  kafka:
    ports:
      - "9092:9092"

  redis:
    ports:
      - "6379:6379"

  auth-mysql:
    ports:
      - "3307:3306"

  user-mysql:
    ports:
      - "3308:3306"

  habit-mysql:
    ports:
      - "3309:3306"

  config-server:
    ports:
      - "9000:9000"

  eureka-server:
    ports:
      - "8761:8761"

  auth-service:
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_HOST: ${AUTH_DB_HOST:-auth-mysql:3306}
      DB_USERNAME: ${AUTH_DB_USERNAME:-auth_user}
      DB_PASSWORD: ${AUTH_DB_PASSWORD:-auth_password}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      EUREKA_URL: ${EUREKA_URL:-http://adbin:adbin@eureka-server:8761/eureka/}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      JWT_COOKIE_DOMAIN: ${JWT_COOKIE_DOMAIN:-localhost}
      USER_SERVICE_BASE_URL: ${USER_SERVICE_BASE_URL:-http://user-service:8081}

  user-service:
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_HOST: ${USER_DB_HOST:-user-mysql:3306}
      DB_USERNAME: ${USER_DB_USERNAME:-user_user}
      DB_PASSWORD: ${USER_DB_PASSWORD:-user_password}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      EUREKA_URL: ${EUREKA_URL:-http://adbin:adbin@eureka-server:8761/eureka/}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      JWT_COOKIE_DOMAIN: ${JWT_COOKIE_DOMAIN:-localhost}

  habit-service:
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_HOST: ${HABIT_DB_HOST:-habit-mysql:3306}
      DB_USERNAME: ${HABIT_DB_USERNAME:-habit_user}
      DB_PASSWORD: ${HABIT_DB_PASSWORD:-habit_password}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      EUREKA_URL: ${EUREKA_URL:-http://adbin:adbin@eureka-server:8761/eureka/}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      JWT_COOKIE_DOMAIN: ${JWT_COOKIE_DOMAIN:-localhost}

  gateway:
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
